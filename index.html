<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0E14">
  <title>SignalDesk · 美股訊號</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">SignalDesk</span>
    </div>
    <div class="topbar-right">
      <span id="date-label" class="date mono"></span>
      <button id="next-day" class="next-day" title="模擬下一個交易日">下一日 ›</button>
    </div>
  </header>

  <main id="view" class="view"><!-- 由 app.js 渲染 --></main>

  <nav class="tabbar">
    <button data-tab="today" class="active">
      <span class="tab-ico">◎</span><span>今日</span></button>
    <button data-tab="portfolio">
      <span class="tab-ico">▤</span><span>持倉</span></button>
    <button data-tab="sectors">
      <span class="tab-ico">▦</span><span>板塊</span></button>
    <button data-tab="explore">
      <span class="tab-ico">⌕</span><span>探索</span></button>
    <button data-tab="perf">
      <span class="tab-ico">◪</span><span>績效</span></button>
    <button data-tab="backtest">
      <span class="tab-ico">⟲</span><span>回測</span></button>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
